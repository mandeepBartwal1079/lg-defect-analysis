<header class="app-header">
  <div class="header-left">
    <span class="logo-text">
      <!-- SVG stays same -->
      <img src="images/logo.png" alt="Logo" class="logo">
    </span>
  </div>

  <!-- TRUE CENTER -->
  <div class="header-center">
    <span class="project-name">Quick Alert Quality Reflection</span>
  </div>

  <div class="header-right">
    <div class="date-container">
      <label class="date-label">Production Scheduled for</label>
      <span class="date">{{ displayDate() | date: 'yyyy-MM-dd' }}</span>
    </div>
    <div class="header-actions">
      <button class="filter-toggle-btn" (click)="toggleFilters()" [class.active]="showFilters()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 4.5H16M5 9H13M7.5 13.5H10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        Filters
      </button>
    </div>
  </div>
</header>
