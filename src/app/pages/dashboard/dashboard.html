<div class="dashboard-root">
  <app-header></app-header>
  <div class="dashboard">
    <app-filters />
    <div class="defects-grid" [style.grid-template-columns]="'repeat(' + gridCols() + ', 1fr)'">
      @for (plan of filteredPlans(); track plan.planId) {
        <app-defect-card [plan]="plan" (openDetails)="openPlanDetails($event)" />
      } @empty {
        <div class="no-plans">
          <p>No production plans scheduled for today ({{ currentTodayDate() }}).</p>
        </div>
      }
    </div>
  </div>
  <app-defect-modal 
    [isOpen]="isModalOpen()" 
    [defectDetail]="selectedDefectDetail()" 
    (close)="closeModal()" 
    (refresh)="getPlans()"
  />
  <app-chat-bot />
</div>
