<div class="dashboard-root">
  <app-header (filterToggle)="showFilters($event)"></app-header>
  <div class="dashboard">
    <app-filters [showFilters]="filtersVisible()" />
    <div class="defects-grid" [style.grid-template-columns]="'repeat(' + gridCols() + ', 1fr)'">
      @for (planItem of filteredPlans(); track planItem.planId) {
        <app-defect-card [plan]="planItem" (openDetails)="openPlanDetails($event)" />
      } @empty {
        <div class="no-plans">
          <p>No production plans scheduled for today ({{ currentTodayDate() }}).</p>
        </div>
      }
    </div>
  </div>
  <app-defect-modal
    [isOpen]="isModalOpen()"
    [defectDetail]="selectedDefectDetail()"
    (close)="closeModal()"
    (refresh)="getPlans()"
  />
  <app-chat-bot />
</div>
